name: BLT GitHub App
description: Integrates BLT services into GitHub — issue assignment, bug reporting, and PR management.
url: https://owaspblt.org
hook_attributes:
  url: https://example.com/api/github/webhooks
redirect_url: https://example.com
public: true
default_permissions:
  checks: write
  issues: write
  pull_requests: write
  contents: read
  metadata: read
default_events:
  - check_run
  - check_suite
  - issue_comment
  - issues
  - pull_request
  - pull_request_review
