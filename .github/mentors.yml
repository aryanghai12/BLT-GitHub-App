# BLT-Pool Mentor Configuration
#
# This file defines the mentor pool used by the BLT GitHub App to auto-assign
# mentors when a contributor requests help (via /mentor comment or needs-mentor
# label).
#
# Each entry supports the following fields:
#   github_username  - GitHub login (required for assignment)
#   name             - Display name shown in assignment comments
#   specialties      - Optional list of area tags used to match issue labels
#                      (e.g. frontend, backend, javascript, python, docs, security)
#   max_mentees      - Maximum concurrent open mentee issues (default: 3)
#   active           - Whether this mentor accepts new assignments (default: true)
#   timezone         - Optional timezone hint (e.g. "UTC+5:30")
#
# To pause yourself from receiving new assignments:
#   1. Open a PR setting active: false for your entry.
#   2. OR comment /mentor-pause on any issue (the bot will guide you).
#
# Assignment strategy: capacity-aware round-robin. The mentor with the fewest
# current open mentored issues (under their max_mentees cap) is selected.
# When an issue has labels matching a mentor's specialties those mentors are
# preferred before falling back to the global pool.

mentors:
